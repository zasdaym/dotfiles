k9s:
  body:
    fgColor: *black
    bgColor: *paper
    logoColor: *orange
    logoColorMsg: *base700
    logoColorInfo: *green
    logoColorWarn: *yellow
    logoColorError: *red
  prompt:
    fgColor: *black
    bgColor: *paper
    suggestColor: *cyan
    border:
      command: *orange
      default: *cyan
  info:
    fgColor: *blue
    sectionColor: *yellow
    cpuColor: *green
    memColor: *magenta
    k9sRevColor: *cyan
  dialog:
    fgColor: *black
    bgColor: *base50
    buttonFgColor: *black
    buttonBgColor: *base100
    buttonFocusFgColor: *paper
    buttonFocusBgColor: *blue
    labelFgColor: *orange
    fieldFgColor: *black
  help:
    fgColor: *black
    bgColor: *base50
    keyColor: *cyan
    numKeyColor: *magenta
    sectionColor: *yellow
  frame:
    border:
      fgColor: *base300
      focusColor: *base600
    menu:
      fgColor: *base700
      fgStyle: dim
      keyColor: *cyan
      numKeyColor: *magenta
    crumbs:
      fgColor: *black
      bgColor: *base100
      activeColor: *base200
    status:
      newColor: *cyan
      modifyColor: *blue
      addColor: *green
      pendingColor: *yellow
      errorColor: *red
      highlightColor: *yellow
      killColor: *magenta
      completedColor: *base500
    title:
      fgColor: *black
      bgColor: *paper
      highlightColor: *orange
      counterColor: *cyan
      filterColor: *magenta
  views:
    charts:
      bgColor: *paper
      dialBgColor: *base50
      chartBgColor: *base50
      defaultDialColors:
        - *cyan
        - *red
      defaultChartColors:
        - *blue
        - *orange
      resourceColors:
        cpu:
          - *green
          - *yellow
        memory:
          - *blue
          - *magenta
      focusFgColor: *paper
      focusBgColor: *blue
    table:
      fgColor: *black
      bgColor: *paper
      cursorFgColor: *black
      cursorBgColor: *base200
      markColor: *yellow
      header:
        fgColor: *black
        bgColor: *base50
        sorterColor: *cyan
        selectedSortColumnColor: *blue
    xray:
      fgColor: *black
      bgColor: *paper
      cursorColor: *base200
      cursorTextColor: *black
      graphicColor: *blue
      showIcons: false
    picker:
      mainColor: *black
      focusColor: *blue
      shortcutColor: *cyan
    yaml:
      keyColor: *cyan
      colonColor: *base500
      valueColor: *black
    logs:
      fgColor: *black
      bgColor: *paper
      indicator:
        fgColor: *paper
        bgColor: *orange
        toggleOnColor: *green
        toggleOffColor: *base500
